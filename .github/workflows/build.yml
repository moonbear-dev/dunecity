name: Build Dune Legacy

on:
  push:
    branches: [ main, release-* ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'
      
      - name: Configure CMake
        # Quote the -D arg so PowerShell expands $env:VCPKG_ROOT instead
        # of treating the colon-slash as a literal string. Without the
        # quotes CMake gets the unexpanded path and fails to find the
        # toolchain file.
        run: cmake -B build "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Create Installer Package
        run: |
          cd build
          cmake --install . --prefix install --config Release
          cpack -G ZIP -C Release
      
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: DuneCity-Windows-Installer
          path: build/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'
      
      - name: Configure CMake
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=arm64-osx-dynamic
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Create DMG Installer
        run: |
          cd build
          cmake --install . --prefix install --config Release
          cpack -G DragNDrop -C Release
      
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DuneCity-macOS-DMG
          path: build/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # vcpkg builds several autotools-based ports from source on Linux
      # (libxcrypt, sdl2-mixer's flac/opus/etc.) and needs the GNU build
      # toolchain pre-installed on the runner. Without these the Configure
      # step fails with: "libxcrypt currently requires ... autoconf
      # autoconf-archive automake libtoolize". Also pulling in
      # build-essential + libltdl-dev so any other transitive port that
      # needs them is happy.
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf autoconf-archive automake libtool libltdl-dev \
            build-essential pkg-config bison flex

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Create Linux Packages
        run: |
          cd build
          cmake --install . --prefix install --config Release
          cpack -G "DEB;RPM;TGZ" -C Release
      
      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: DuneCity-Linux-Packages
          path: |
            build/*.deb
            build/*.rpm
            build/*.tar.gz

  # Auto-publish a GitHub Release on every v* tag push. Pulls down the
  # three platform artifacts from this run and attaches them. The
  # in-game VersionChecker hits the GitHub Releases /latest endpoint,
  # so creating a release here automatically flips every existing
  # install's "update available" flag the next time they launch.
  release:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: DuneCity-Windows-Installer
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: DuneCity-macOS-DMG
          path: dist/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: DuneCity-Linux-Packages
          path: dist/linux

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES_FILE="$(mktemp)"
          {
            echo "Dune City ${TAG}"
            echo
            echo "Auto-built from tag ${TAG}. See the [CHANGELOG](https://github.com/${GITHUB_REPOSITORY}/commits/${TAG}) for what's in this release."
            echo
            echo "**Downloads** (attached below):"
            echo "- Windows: \`DuneCity-*.zip\`"
            echo "- macOS: \`DuneCity-*.dmg\`"
            echo "- Linux: \`.deb\` / \`.rpm\` / \`.tar.gz\`"
            echo
            echo "Upgrading from a previous Dune City install? Your built-in mod INI files are reseeded automatically on first launch."
          } > "$NOTES_FILE"

          # If a release for this tag already exists (e.g. it was hand-
          # made first), upload the artifacts onto it; otherwise create
          # a fresh release.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*/* --clobber
            gh release edit "$TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" dist/*/* \
              --title "Dune City ${TAG}" \
              --notes-file "$NOTES_FILE"
          fi

